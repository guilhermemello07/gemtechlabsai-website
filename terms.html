<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service — GemTech Labs AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #34c759;
            --orange: #f5a623;
            --bg: #fafafa;
            --bg-card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6e6e73;
            --text-tertiary: #aeaeb2;
            --border: rgba(0,0,0,0.06);
            --surface: #f2f2f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --bg-card: #1c1c1e;
                --text: #f5f5f7;
                --text-secondary: #98989d;
                --text-tertiary: #636366;
                --border: rgba(255,255,255,0.08);
                --surface: #1c1c1e;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 60px 24px;
            text-align: center;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 40px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(28px, 5vw, 36px);
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.5;
        }
        .app-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .app-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        .app-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .app-card.foodlens:hover { border-color: var(--green); }
        .app-card.jornada:hover { border-color: var(--orange); }
        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-icon.foodlens { box-shadow: 0 4px 16px rgba(52,199,89,0.2); }
        .app-icon.jornada { box-shadow: 0 4px 16px rgba(196,94,0,0.2); }
        .app-info {
            text-align: left;
            flex: 1;
        }
        .app-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 2px;
        }
        .app-info p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .arrow {
            font-size: 20px;
            color: var(--text-tertiary);
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .app-card:hover .arrow { transform: translateX(4px); }
        @media (max-width: 480px) {
            .app-card { padding: 20px; gap: 16px; }
            .app-icon { width: 48px; height: 48px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; GemTech Labs AI</a>
        <h1>Terms of Service</h1>
        <p class="subtitle">Select an app to view its terms of service.</p>

        <div class="app-cards">
            <a href="/foodlens/terms" class="app-card foodlens">
                <div class="app-icon foodlens">
                    <img src="/images/foodlens-icon.png" alt="FoodLens">
                </div>
                <div class="app-info">
                    <h2>FoodLens</h2>
                    <p>Food product analysis and health scoring</p>
                </div>
                <span class="arrow">&rsaquo;</span>
            </a>

            <a href="/jornada/terms" class="app-card jornada">
                <div class="app-icon jornada">
                    <img src="/images/JornadaAppLogo.png" alt="Jornada">
                </div>
                <div class="app-info">
                    <h2>Jornada</h2>
                    <p>AI-powered travel planning</p>
                </div>
                <span class="arrow">&rsaquo;</span>
            </a>
        </div>
    </div>
</body>
</html>
